{% extends "base.html" %}



{% block title %}
Historie
{% endblock %}



{% block content %}


<h1>
Alle wijzigingen
</h1>



<table>


<tr>

<th>
Datum
</th>


<th>
Type
</th>


<th>
Bericht
</th>


</tr>



{% for log in logs %}


<tr>


<td>
{{ log.created_at }}
</td>


<td>
{{ log.change_type }}
</td>


<td>

<pre>
{{ log.message }}
</pre>

</td>


</tr>


{% else %}


<tr>

<td colspan="3">

Geen wijzigingen

</td>

</tr>


{% endfor %}


</table>


{% endblock %}
